<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pixel Hangman – Nexora Edition</title>
<style>
  body {
    margin: 0;
    background: #0f172a;
    font-family: "Segoe UI", sans-serif;
    color: #e5e7eb;
    display: flex;
    justify-content: center;
    padding: 40px 0;
  }

  #gameWrapper {
    width: 60vw;
    min-width: 600px;
    background: #020617;
    border: 1px solid #1f2937;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 0 25px rgba(56,189,248,0.25);
  }

  h1 {
    text-align: center;
    color: #38bdf8;
    margin-bottom: 10px;
  }

  #lengthSelect {
    text-align: center;
    margin-bottom: 20px;
  }

  .lenBtn {
    padding: 10px 18px;
    margin: 5px;
    background: #1e293b;
    border: 1px solid #38bdf8;
    color: #38bdf8;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
  }
  .lenBtn:hover {
    background: #0ea5e9;
    color: #000;
  }

  #startBtn {
    display: block;
    margin: 20px auto;
    padding: 12px 25px;
    background: #38bdf8;
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: bold;
  }
  #startBtn:hover {
    background: #0ea5e9;
  }

  #wordArea {
    margin-top: 30px;
    text-align: center;
    font-size: 2rem;
    letter-spacing: 12px;
  }

  #alphabet {
    margin-top: 30px;
    text-align: center;
  }

  .letterBtn {
    display: inline-block;
    margin: 4px;
    padding: 10px 14px;
    background: #1e293b;
    border: 1px solid #4b5563;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    color: #e5e7eb;
  }
  .letterBtn:hover {
    background: #38bdf8;
    color: #000;
  }
  .letterBtn.used {
    background: #4b5563;
    color: #1e293b;
    cursor: default;
  }

  #points {
    text-align: center;
    margin-top: 20px;
    font-size: 1.3rem;
    color: #38bdf8;
  }

  #popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #1e293b;
    border: 2px solid #38bdf8;
    padding: 20px;
    border-radius: 10px;
    display: none;
    color: #e5e7eb;
    text-align: center;
    box-shadow: 0 0 20px rgba(56,189,248,0.4);
  }

  #popup button {
    margin-top: 10px;
    padding: 8px 16px;
    background: #38bdf8;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: #000;
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <h1>Pixel Hangman – Nexora Edition</h1>

  <div id="lengthSelect">
    <p>Wähle die Wortlänge:</p>
    <button class="lenBtn" data-len="4">4</button>
    <button class="lenBtn" data-len="5">5</button>
    <button class="lenBtn" data-len="6">6</button>
    <button class="lenBtn" data-len="7">7</button>
    <button class="lenBtn" data-len="8">8</button>
  </div>

  <button id="startBtn">Start</button>

  <div id="wordArea"></div>

  <div id="alphabet"></div>

  <div id="points">Punkte: 20</div>
</div>

<div id="popup">
  <div id="popupText"></div>
  <button onclick="closePopup()">OK</button>
</div>

<script>
let chosenLength = null;
let secretWord = "";
let displayWord = [];
let points = 20;

const words = {
  4: ["haus","baum","tür","ofen","wolf","käse","maus","boot","zahn"],
  5: ["äpfel","blume","stuhl","wolke","hütte","kiste","zange","tisch"],
  6: ["fenster","garten","könige","würfel","straße","hunger","koffer"],
  7: ["schrank","flasche","brötchen","königin","schlüssel","drache"],
  8: ["schreiben","flughafen","kaktusöl","königreich","schmiede"]
};

const alphabet = "abcdefghijklmnopqrstuvwxyzäöü";

document.querySelectorAll(".lenBtn").forEach(btn => {
  btn.addEventListener("click", () => {
    chosenLength = parseInt(btn.dataset.len);
    popup("Wortlänge " + chosenLength + " gewählt.");
  });
});

document.getElementById("startBtn").addEventListener("click", () => {
  if (!chosenLength) {
    popup("Bitte zuerst eine Wortlänge wählen!");
    return;
  }
  startGame();
});

function startGame() {
  points = 20;
  document.getElementById("points").textContent = "Punkte: " + points;

  const list = words[chosenLength];
  secretWord = list[Math.floor(Math.random() * list.length)];

  displayWord = Array(secretWord.length).fill("_");

  renderWord();
  renderAlphabet();
}

function renderWord() {
  document.getElementById("wordArea").textContent = displayWord.join(" ");
}

function renderAlphabet() {
  const area = document.getElementById("alphabet");
  area.innerHTML = "";

  alphabet.split("").forEach(letter => {
    const btn = document.createElement("button");
    btn.textContent = letter;
    btn.className = "letterBtn";
    btn.addEventListener("click", () => guess(letter, btn));
    area.appendChild(btn);
  });
}

function guess(letter, btn) {
  if (btn.classList.contains("used")) return;
  btn.classList.add("used");

  let found = false;
  let positions = [];

  for (let i = 0; i < secretWord.length; i++) {
    if (secretWord[i] === letter) {
      found = true;
      positions.push(i + 1);
      displayWord[i] = letter;
    }
  }

  if (found) {
    popup("Treffer! Position(en): " + positions.join(", "));
  } else {
    points--;
    document.getElementById("points").textContent = "Punkte: " + points;
    popup("Leider falsch!");
  }

  renderWord();

  if (displayWord.join("") === secretWord) {
    popup("Gewonnen! Das Wort war: " + secretWord);
  }

  if (points <= 0) {
    popup("Verloren! Das Wort war: " + secretWord);
  }
}

function popup(text) {
  document.getElementById("popupText").textContent = text;
  document.getElementById("popup").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
