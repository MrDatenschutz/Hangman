<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pixel Hangman</title>
<style>
  body {
    margin: 0;
    background: #0f172a;
    font-family: "Segoe UI", sans-serif;
    color: #e5e7eb;
    display: flex;
    justify-content: center;
    padding: 40px 0;
  }

  #gameWrapper {
    width: 60vw;
    min-width: 600px;
    background: #020617;
    border: 1px solid #1f2937;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 0 25px rgba(56,189,248,0.25);
  }

  h1 {
    text-align: center;
    color: #38bdf8;
    margin-bottom: 10px;
  }

  #lengthSelect {
    text-align: center;
    margin-bottom: 20px;
  }

  .lenBtn {
    padding: 10px 18px;
    margin: 5px;
    background: #1e293b;
    border: 1px solid #38bdf8;
    color: #38bdf8;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
  }
  .lenBtn:hover {
    background: #0ea5e9;
    color: #000;
  }

  #startBtn {
    display: block;
    margin: 20px auto;
    padding: 12px 25px;
    background: #38bdf8;
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: bold;
  }
  #startBtn:hover {
    background: #0ea5e9;
  }

  #wordArea {
    margin-top: 30px;
    text-align: center;
    font-size: 2rem;
    letter-spacing: 12px;
  }

  #alphabet {
    margin-top: 30px;
    text-align: center;
  }

  .letterBtn {
    display: inline-block;
    margin: 4px;
    padding: 10px 14px;
    background: #1e293b;
    border: 1px solid #4b5563;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    color: #e5e7eb;
    transition: 0.15s;
  }
  .letterBtn:hover {
    background: #38bdf8;
    color: #000;
  }
  .letterBtn.used {
    cursor: default;
  }

  .letterBtn.correct {
    background: #22c55e !important;
    border-color: #22c55e !important;
    color: #000 !important;
    box-shadow: 0 0 12px #22c55e;
  }

  .letterBtn.wrong {
    background: #ef4444 !important;
    border-color: #ef4444 !important;
    color: #000 !important;
    box-shadow: 0 0 12px #ef4444;
  }

  #points {
    text-align: center;
    margin-top: 20px;
    font-size: 1.3rem;
    color: #38bdf8;
  }

  #msg {
    text-align: center;
    margin-top: 8px;
    font-size: 1.1rem;
    min-height: 24px;
    color: #e5e7eb;
    opacity: 0;
    transition: opacity 0.2s;
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <h1>Pixel Hangman</h1>

  <div id="lengthSelect">
    <p>Wähle die Wortlänge:</p>
    <button class="lenBtn" data-len="4">4</button>
    <button class="lenBtn" data-len="5">5</button>
    <button class="lenBtn" data-len="6">6</button>
    <button class="lenBtn" data-len="7">7</button>
    <button class="lenBtn" data-len="8">8</button>
  </div>

  <button id="startBtn">Start</button>

  <div id="wordArea"></div>

  <div id="alphabet"></div>

  <div id="points">Punkte: 0</div>
  <div id="msg"></div>
</div>

<script>
let chosenLength = null;
let secretWord = "";
let displayWord = [];
let points = 0;
let msgTimer = null;

const words = {
  4: ["haus","baum","tür","ofen","wolf","käse","maus","boot","zahn"],
  5: ["äpfel","blume","stuhl","wolke","hütte","kiste","zange","tisch"],
  6: ["fenster","garten","könige","würfel","straße","hunger","koffer"],
  7: ["schrank","flasche","brötchen","königin","schlüssel","drache"],
  8: ["schreiben","flughafen","kaktusöl","königreich","schmiede"]
};

const alphabet = "abcdefghijklmnopqrstuvwxyzäöü";

document.querySelectorAll(".lenBtn").forEach(btn => {
  btn.addEventListener("click", () => {
    chosenLength = parseInt(btn.dataset.len);
    showMsg("Wortlänge " + chosenLength + " gewählt.");
  });
});

document.getElementById("startBtn").addEventListener("click", () => {
  if (!chosenLength) {
    showMsg("Bitte zuerst eine Wortlänge wählen!");
    return;
  }
  startGame();
});

function startGame() {
  points = getStartPoints(chosenLength);
  document.getElementById("points").textContent = "Punkte: " + points;

  const list = words[chosenLength];
  secretWord = list[Math.floor(Math.random() * list.length)];

  displayWord = Array(secretWord.length).fill("_");

  renderWord();
  renderAlphabet();
  showMsg("Spiel gestartet!");
}

function getStartPoints(len) {
  if (len === 4) return 10;
  if (len === 5) return 15;
  if (len === 6) return 18;
  if (len === 7) return 20;
  if (len === 8) return 24;
  return 20;
}

function renderWord() {
  document.getElementById("wordArea").textContent = displayWord.join(" ");
}

function renderAlphabet() {
  const area = document.getElementById("alphabet");
  area.innerHTML = "";

  alphabet.split("").forEach(letter => {
    const btn = document.createElement("button");
    btn.textContent = letter;
    btn.className = "letterBtn";
    btn.addEventListener("click", () => guess(letter, btn));
    area.appendChild(btn);
  });
}

function guess(letter, btn) {
  if (btn.classList.contains("used")) return;
  btn.classList.add("used");

  let found = false;
  let positions = [];

  for (let i = 0; i < secretWord.length; i++) {
    if (secretWord[i] === letter) {
      found = true;
      positions.push(i + 1);
      displayWord[i] = letter;
    }
  }

  if (found) {
    btn.classList.add("correct");
    points += 1;
    showMsg("Treffer! Position(en): " + positions.join(", "));
  } else {
    btn.classList.add("wrong");
    points -= 2;
    showMsg("Leider falsch!");
  }

  document.getElementById("points").textContent = "Punkte: " + points;
  renderWord();

  if (displayWord.join("") === secretWord) {
    showMsg("Gewonnen! Das Wort war: " + secretWord);
  }

  if (points <= 0) {
    showMsg("Verloren! Das Wort war: " + secretWord);
  }
}

function showMsg(text) {
  const msg = document.getElementById("msg");

  if (msgTimer) clearTimeout(msgTimer);

  msg.textContent = text;
  msg.style.opacity = 1;

  msgTimer = setTimeout(() => {
    msg.style.opacity = 0;
  }, 2000);
}
</script>

</body>
</html>
